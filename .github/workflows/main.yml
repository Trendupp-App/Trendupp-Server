name: Deploy Trendupp-Server to AL2023

on:
  push:
    branches:
      - main # Triggers the deployment when you push to the main branch
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Force non-interactive shell to load environment profile paths and global directories
            export HOME="/home/ec2-user"
            export NVM_DIR="$HOME/.nvm"
            
            [ -s "$HOME/.bash_profile" ] && source "$HOME/.bash_profile"
            [ -s "$HOME/.bashrc" ] && source "$HOME/.bashrc"
            [ -s "$NVM_DIR/nvm.sh" ] && source "$NVM_DIR/nvm.sh"
            
            # Explicit path expansion to locate system-wide and user-space binaries
            export PATH=$PATH:/usr/bin:/usr/local/bin:$HOME/.local/bin:$HOME/.npm-global/bin

            # 1. Navigate to the project folder or clone it if it's the first deployment
            if [ ! -d "/home/ec2-user/trendupp-server" ]; then
              echo "Repository not found on server. Cloning branch ${{ github.ref_name }}..."
              git clone --branch ${{ github.ref_name }} https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /home/ec2-user/trendupp-server
              cd /home/ec2-user/trendupp-server || exit 1
            else
              cd /home/ec2-user/trendupp-server || exit 1
              echo "Repository found. Cleaning up unexpected local modifications..."
              
              # Aggressively clear untracked files and local code modifications
              git reset --hard
              git clean -fd
              
              echo "Checking out and pulling branch ${{ github.ref_name }}..."
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git fetch origin
              git checkout ${{ github.ref_name }}
              git pull origin ${{ github.ref_name }}
            fi

            # Fix directory ownership recursively to ensure ec2-user has full clearance
            sudo chown -R ec2-user:ec2-user /home/ec2-user/trendupp-server

            # 2. Inject environment variables securely using an absolute path and sudo tee
            echo "${{ secrets.ENV_FILE }}" | sudo tee /home/ec2-user/trendupp-server/.env > /dev/null
            sudo chown ec2-user:ec2-user /home/ec2-user/trendupp-server/.env

            # 3. Install dependencies: Attempt clean install, fallback to adaptive install if lockfile is out of sync
            npm ci --no-audit --no-fund || npm install --no-audit --no-fund

            # 4. Build the NestJS project using the local node_modules binary path safety reference
            ./node_modules/.bin/nest build

            # 5. Prune devDependencies to keep the production footprint small
            npm prune --omit=dev

            # Resolve the correct PM2 binary path (prefer local, fallback to global)
            PM2_BIN=""
            if [ -f "./node_modules/.bin/pm2" ]; then
              PM2_BIN="./node_modules/.bin/pm2"
            elif command -v pm2 &> /dev/null; then
              PM2_BIN="pm2"
            fi

            # 6. Gracefully reload or start the NestJS API process using your ecosystem configuration
            if [ -n "$PM2_BIN" ]; then
              $PM2_BIN describe trendupp-api > /dev/null 2>&1
              if [ $? -eq 0 ]; then
                echo "Trendupp-Server is running. Reloading gracefully via ecosystem file..."
                $PM2_BIN reload ecosystem.config.js --env production
              else
                echo "Trendupp-Server is offline. Starting new PM2 instance via ecosystem file..."
                $PM2_BIN start ecosystem.config.js --env production
              fi
              
              # 7. Save the PM2 process list so it survives a server reboot
              $PM2_BIN save
            else
              echo "Error: PM2 engine binary is not accessible in this shell execution scope."
              exit 1
            fi