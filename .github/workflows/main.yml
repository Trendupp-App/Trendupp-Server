name: Deploy Trendupp-Server to AL2023

on:
  push:
    branches:
      - main # Triggers the deployment when you push to the main branch
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Navigate to the project folder or clone it if it's the first deployment
            if [ ! -d "/home/ec2-user/trendupp-server" ]; then
              echo "Repository not found on server. Cloning..."
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /home/ec2-user/trendupp-server
              cd /home/ec2-user/trendupp-server
            else
              cd /home/ec2-user/trendupp-server
              echo "Repository found. Pulling latest changes..."
              git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
              git pull origin main
            fi

            # 2. Inject the environment variables from GitHub Secrets dynamically
            echo "${{ secrets.ENV_FILE }}" > .env

            # 3. Install all dependencies optimized for production speed
            npm ci --no-audit --no-fund

            # 4. Build the NestJS project (compiles TS files to dist/)
            npm run build

            # 5. Prune devDependencies to keep the production footprint small
            npm prune --omit=dev

            # 6. Gracefully reload or start the NestJS API process using your ecosystem configuration
            pm2 describe trendupp-api > /dev/null 2>&1
            if [ $? -eq 0 ]; then
              echo "Trendupp-Server is running. Reloading gracefully via ecosystem file..."
              pm2 reload ecosystem.config.js --env production
            else
              echo "Trendupp-Server is offline. Starting new PM2 instance via ecosystem file..."
              pm2 start ecosystem.config.js --env production
            fi
            
            # 7. Save the PM2 process list so it survives a server reboot
            pm2 save